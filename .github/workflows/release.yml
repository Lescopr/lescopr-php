name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── 1. Tests must pass before releasing ────────────────────────────────────
  test:
    name: Tests (PHP 8.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: json, openssl, curl
          coverage: none

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        env:
          LESCOPR_DAEMON_MODE: "true"
        run: composer test

  # ── 2. Create GitHub Release with CHANGELOG notes ─────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract CHANGELOG notes for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract section between this version and the previous one
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md \
            | grep -v "^## \[" | sed '/^$/N;/^\n$/d')
          # Escape newlines for GitHub output
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Notify Packagist (auto-update) ─────────────────────────────────────
  packagist:
    name: Packagist Update
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - name: Trigger Packagist update
        run: |
          curl -s -X POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d '{"repository":{"url":"https://github.com/Lescopr/lescopr-php"}}' \
            -H "Content-Type: application/json"

